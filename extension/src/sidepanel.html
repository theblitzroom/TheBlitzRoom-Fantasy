<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Blitz Room</title>
    <link rel="stylesheet" href="./sidepanel.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-cluster">
          <img class="brand-logo" src="./assets/blitz-room-logo.png" alt="The Blitz Room">
          <div class="brand-copy">
            <p class="eyebrow">The Blitz Room</p>
            <h1 id="draftName">Live draft board</h1>
          </div>
        </div>
        <button id="refreshButton" class="icon-button" title="Refresh now" aria-label="Refresh now">R</button>
      </header>

      <section class="sync-panel" aria-label="Draft sync">
        <label class="field">
          <span>Draft ID</span>
          <input id="draftIdInput" type="text" inputmode="numeric" autocomplete="off" placeholder="Open a Sleeper draft">
        </label>
        <button id="saveDraftButton" class="primary-button">Sync</button>
      </section>

      <section class="status-strip" aria-live="polite">
        <div>
          <span class="metric-label">Pick</span>
          <strong id="pickMetric">-</strong>
        </div>
        <div>
          <span class="metric-label">Format</span>
          <strong id="formatMetric">-</strong>
        </div>
        <div>
          <span class="metric-label">Status</span>
          <strong id="statusMetric">Idle</strong>
        </div>
      </section>

      <section id="picksView" class="recommendation-panel view-panel" aria-label="Recommendations">
        <div id="draftSimulatorPanel" class="insight-panel draft-simulator-priority"></div>
        <div class="section-heading">
          <h2>Best picks now</h2>
          <span id="rankingFreshness">No rankings loaded</span>
        </div>
        <div id="recommendations" class="recommendations"></div>
        <div class="draft-intel-panel" aria-label="Draft intelligence">
          <div id="fantasyIqSummary" class="intel-grid"></div>
          <div id="draftCoachPanel" class="insight-panel"></div>
          <div id="stackAnalyzerPanel" class="insight-panel"></div>
          <div id="playoffFocusPanel" class="insight-panel"></div>
          <div id="draftStrategyMeter" class="strategy-meter"></div>
          <div id="pickPrediction" class="prediction-list"></div>
          <div id="liveMomentumPanel" class="insight-panel"></div>
          <div class="assistant-box">
            <label class="field assistant-field">
              <span>AI Chat Never Sleeps</span>
              <input id="assistantQuestionInput" type="text" autocomplete="off" placeholder="Should I go RB here?">
            </label>
            <button id="assistantAskButton" class="secondary-button" type="button">Ask</button>
          </div>
          <div id="assistantAnswer" class="assistant-answer"></div>
          <div id="comparisonPanel" class="comparison-panel is-hidden"></div>
          <div id="draftFeed" class="draft-feed"></div>
        </div>
      </section>

      <section class="team-panel" aria-label="Team setup">
        <div id="detectedRoster" class="detected-team">Detecting your Sleeper team</div>
        <div id="rosterSummary" class="roster-summary"></div>
      </section>

      <nav class="view-tabs" aria-label="Draft views">
        <button id="picksTabButton" class="tab-button is-active" type="button">Picks</button>
        <button id="availableTabButton" class="tab-button" type="button">Available</button>
        <button id="teamsTabButton" class="tab-button" type="button">Teams</button>
      </nav>

      <section id="availableView" class="available-panel view-panel is-hidden" aria-label="Available players">
        <div class="section-heading">
          <h2>Available board</h2>
          <span id="availableSummary">-</span>
        </div>
        <div id="positionFilterControls" class="position-filter-controls" role="group" aria-label="Position filter"></div>
        <div id="availableBoard" class="available-board"></div>
      </section>

      <section id="teamsView" class="teams-panel view-panel is-hidden" aria-label="Teams">
        <div class="section-heading">
          <h2>Teams</h2>
          <span id="teamsSummary">-</span>
        </div>
        <div id="leagueAnalyzer" class="league-analyzer"></div>
        <div id="teamsList" class="teams-list"></div>
      </section>

      <section id="advisorOutput" class="advisor-output is-hidden" aria-live="polite"></section>

      <details class="settings-panel">
        <summary>Settings</summary>

        <label class="field">
          <span>Advisor URL</span>
          <input id="advisorUrlInput" type="url" placeholder="http://localhost:8787/advice">
        </label>

        <label class="field">
          <span>Ranking board</span>
          <select id="rankingModeSelect">
            <option value="auto">Auto from synced draft format</option>
            <option value="ppr">Force PPR</option>
            <option value="half_ppr">Force half PPR</option>
            <option value="superflex_dynasty">Force Superflex Dynasty</option>
            <option value="dynasty">Force Dynasty</option>
            <option value="custom">Use imported custom board</option>
          </select>
        </label>

        <div class="field">
          <span>Appearance</span>
          <div id="themeModeControl" class="segmented-control" role="group" aria-label="Appearance">
            <button type="button" data-theme-mode="system">System</button>
            <button type="button" data-theme-mode="light">Light</button>
            <button type="button" data-theme-mode="dark">Dark</button>
          </div>
        </div>
        <button id="saveSettingsButton" class="secondary-button">Save settings</button>

        <div class="file-actions">
          <label class="file-button">
            <input id="rankingsFile" type="file" accept="application/json">
            Import rankings JSON
          </label>
          <label class="file-button">
            <input id="evidenceFile" type="file" accept="application/json">
            Import evidence JSON
          </label>
        </div>

        <div class="settings-actions">
          <button id="openEditorButton" class="secondary-button">Open rankings editor</button>
          <button id="loadSampleButton" class="secondary-button">Load sample data</button>
          <button id="clearDataButton" class="danger-button">Clear draft data</button>
        </div>
      </details>
    </main>

    <template id="recommendationTemplate">
      <article class="player-card">
        <div class="player-card-header">
          <div>
            <h3 class="player-name"></h3>
            <p class="player-subtitle"></p>
          </div>
          <div class="rating-cluster">
            <div class="score-pill"></div>
            <button class="details-toggle-button" type="button" aria-expanded="false" aria-label="Show player details">v</button>
          </div>
        </div>
        <div class="player-details is-collapsed">
          <div class="score-bars"></div>
          <div class="player-meters"></div>
          <ul class="reason-list"></ul>
          <div class="source-list"></div>
          <div class="card-actions">
            <button class="web-check-button secondary-button">Web check</button>
            <button class="mark-taken-button danger-button" type="button">Taken</button>
          </div>
        </div>
      </article>
    </template>

    <template id="teamCardTemplate">
      <article class="team-card">
        <div class="team-card-header">
          <div>
            <h3 class="team-name"></h3>
            <p class="team-subtitle"></p>
          </div>
          <div class="grade-pill"></div>
        </div>
        <div class="roster-summary team-counts"></div>
        <ol class="team-picks"></ol>
      </article>
    </template>

    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
